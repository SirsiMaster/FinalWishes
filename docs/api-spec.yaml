  # ──────────────────────────────────────────────
  # Documents
  # ──────────────────────────────────────────────
  /api/v1/documents/download-url:
    get:
      summary: Generate signed download URL
      description: |
        Generates a Cloud Storage V4 signed URL for downloading a document
        from the vault. URL is valid for 1 hour.
      operationId: getDownloadUrl
      tags: [Documents]
      parameters:
        - name: storageKey
          in: query
          required: true
          schema:
            type: string
          description: Cloud Storage object path (e.g., "estates/xxx/vault/123-file.pdf")
          example: "estates/abc123/vault/1680000000-will.pdf"
      responses:
        "200":
          description: Signed download URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  downloadUrl:
                    type: string
                    format: uri
                    description: Signed URL valid for 1 hour
        "400":
          description: Missing storageKey
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "401":
          description: Not authenticated
        "500":
          description: Failed to generate signed URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  # ──────────────────────────────────────────────
  # PII Vault (Cloud SQL + Cloud KMS)
  # ──────────────────────────────────────────────
  /api/v1/vault/user-pii:
    post:
      summary: Store user PII
      description: |
        Encrypts and stores user PII (SSN, date of birth) in Cloud SQL
        via Cloud KMS envelope encryption. At least one PII field is required.
        All operations are audit-logged.
      operationId: storeUserPII
      tags: [Vault]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreUserPIIRequest"
      responses:
        "200":
          description: PII stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PIIResponse"
        "400":
          description: Missing estate_id or no PII fields provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Storage failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      summary: Retrieve user PII
      description: |
        Retrieves user PII. By default returns masked values (SSN last 4 only).
        Pass full=true to retrieve full PII values (requires elevated access).
        All retrievals are audit-logged.
      operationId: retrieveUserPII
      tags: [Vault]
      parameters:
        - name: estate_id
          in: query
          required: true
          schema:
            type: string
        - name: full
          in: query
          required: false
          schema:
            type: string
            enum: ["true", "false"]
          description: Set to "true" for full PII disclosure
      responses:
        "200":
          description: User PII (masked or full)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPIIResponse"
        "400":
          description: Missing estate_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No PII found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Retrieval failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/vault/asset-pii:
    post:
      summary: Store asset PII
      description: |
        Encrypts and stores asset-level PII (account numbers, routing numbers, VINs)
        in Cloud SQL. At least one PII field is required.
      operationId: storeAssetPII
      tags: [Vault]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreAssetPIIRequest"
      responses:
        "200":
          description: Asset PII stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PIIResponse"
        "400":
          description: Missing required fields or no PII fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Storage failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      summary: Retrieve asset PII
      description: |
        Retrieves asset PII. By default returns masked values (last 4/6 digits only).
        Pass full=true for full disclosure.
      operationId: retrieveAssetPII
      tags: [Vault]
      parameters:
        - name: estate_id
          in: query
          required: true
          schema:
            type: string
        - name: asset_id
          in: query
          required: true
          schema:
            type: string
        - name: full
          in: query
          required: false
          schema:
            type: string
            enum: ["true", "false"]
          description: Set to "true" for full PII disclosure
      responses:
        "200":
          description: Asset PII (masked or full)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetPIIResponse"
        "400":
          description: Missing estate_id or asset_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No PII found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Retrieval failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

