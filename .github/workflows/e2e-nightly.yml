name: E2E Nightly (Playwright vs Prod)

# Runs the full Playwright E2E suite against LIVE prod (https://finalwishes-prod.web.app)
# on a nightly schedule. NOT per-push: the suite hits real prod and is paced around
# the Go API rate limiter (100 req/60s, 10-min ban), so it must never run in the
# hot push/PR loop.
'on':
  schedule:
    # 09:00 UTC daily (~02:00 PT / ~05:00 ET) — quiet hours for prod traffic.
    - cron: '0 9 * * *'
  workflow_dispatch: {}

jobs:
  e2e:
    name: E2E - Playwright (paced, vs prod)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: ./web
        run: npm ci

      - name: Install Playwright browser (chromium)
        working-directory: ./web
        run: npx playwright install --with-deps chromium

      # firebase-admin resolution: scripts/e2e-provision.js runs from the REPO ROOT
      # and does `require('firebase-admin')`. Node resolves modules by walking UP from
      # the cwd (repo root), so the package must live in the repo-root node_modules —
      # installing it under functions/node_modules would NOT be found from the root.
      # `--no-save` keeps package.json / lockfile untouched in CI; firebase-admin's
      # version is already declared in functions/package.json (^13.7.0).
      - name: Install firebase-admin (for provision step)
        run: npm install firebase-admin --no-save

      - name: Write GCP service-account key
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY_FINALWISHES_PROD }}
        run: |
          printf '%s' "$GCP_SA_KEY" > "$RUNNER_TEMP/gcp-sa-key.json"

      - name: Provision E2E test account + estate
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa-key.json
          E2E_TEST_EMAIL: e2e-principal@finalwishes.app
          E2E_PROV_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: node scripts/e2e-provision.js

      - name: Run paced E2E suite
        env:
          E2E_TEST_EMAIL: e2e-principal@finalwishes.app
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: bash scripts/e2e-run.sh

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: web/test-results
          if-no-files-found: ignore
          retention-days: 14
