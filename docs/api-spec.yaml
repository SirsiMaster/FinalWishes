  /api/v1/lockbox/retrieve-credentials:
    post:
      summary: Decrypt and retrieve credentials
      description: |
        Decrypts and returns lockbox credentials for a specific item.
        Requires principal or admin access to the estate.
        All retrievals are audit-logged.
      operationId: retrieveCredentials
      tags: [Lockbox]
