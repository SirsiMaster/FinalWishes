# .golangci.yml — FinalWishes API linter configuration
# Tuned for CI runners with limited RAM (heavy cloud deps)
# golangci-lint v2 format

version: "2"

run:
  timeout: 5m
  go: "1.24"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    govet:
      enable-all: false
  exclusions:
    rules: []

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
