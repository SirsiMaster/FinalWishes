# .golangci.yml — FinalWishes API linter configuration
# Tuned for CI runners with limited RAM (heavy cloud deps)

run:
  timeout: 5m
  go: "1.24"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt

linters-settings:
  govet:
    enable-all: false

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
