        "400":
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: No principal/admin access to estate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Lockbox item or credentials not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Decryption failed
          content:
            application/json:
              schema:
