## Critical Design Decisions
# 1. Royal Neo-Deco design system — Royal Blue (#1E3A5F) + Gold (#C8A951)
#    NOT the Sirsi emerald — explicitly firewalled (Rule 27)
# 2. Hybrid database: Cloud SQL for PII/vault + Firestore for real-time
# 3. Sirsi Sign consumed as service (from SirsiNexusApp) — no own payment infra
# 4. Firebase Auth with MFA (TOTP required)
# 5. SOC 2 + KMS security model (AES-256)
# 6. Vault concept — documents stored as legal evidence, not just files
# 7. Secure Enclave Dashboard — session-based estate ID, no URL slugs (ADR-031)
# 8. Cloud SQL PII Vault (ADR-037)
# 9. Tiered Identity Verification (ADR-035)
# 10. Firestore Direct Reads (ADR-036)

