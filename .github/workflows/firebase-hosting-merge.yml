name: FinalWishes CI/CD Pipeline
'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '22.x'
  GO_VERSION: '1.26'

jobs:
  # ===========================================
  # Web App: Lint, Typecheck, Build
  # ===========================================
  web-check:
    name: Web - Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  web-test:
    name: Web - Test (Vitest)
    runs-on: ubuntu-latest
    needs: web-check
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  web-build:
    name: Web - Build
    runs-on: ubuntu-latest
    needs: [web-check, web-test]
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  # ===========================================
  # API: Lint, Test, Build
  # ===========================================
  api-check:
    name: API - Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::Go files are not formatted. Run 'gofmt -w .' locally."
            gofmt -l .
            exit 1
          fi

      - name: Run tests
        run: go test -v -race ./...

      - name: Build API
        run: go build -v ./cmd/api

  # ===========================================
  # Deploy: Firebase Hosting (finalwishes-prod)
  # ===========================================
  deploy-hosting:
    name: Deploy - Firebase Hosting
    runs-on: ubuntu-latest
    needs: [web-build, api-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: ./web
        run: npm ci

      - name: Build web app
        working-directory: ./web
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FINALWISHES_PROD }}'
          channelId: live
          projectId: finalwishes-prod

  # ===========================================
  # Deploy: Go API to Cloud Run
  # ===========================================
  # SETUP REQUIRED: Create a GitHub Secret named GCP_SA_KEY_FINALWISHES_PROD
  # containing the JSON key for a service account with Cloud Run Admin + Storage Admin roles.
  #
  # To create it:
  #   gcloud iam service-accounts create github-deployer --project=finalwishes-prod
  #   gcloud projects add-iam-policy-binding finalwishes-prod \
  #     --member="serviceAccount:github-deployer@finalwishes-prod.iam.gserviceaccount.com" \
  #     --role="roles/run.admin"
  #   gcloud projects add-iam-policy-binding finalwishes-prod \
  #     --member="serviceAccount:github-deployer@finalwishes-prod.iam.gserviceaccount.com" \
  #     --role="roles/storage.admin"
  #   gcloud projects add-iam-policy-binding finalwishes-prod \
  #     --member="serviceAccount:github-deployer@finalwishes-prod.iam.gserviceaccount.com" \
  #     --role="roles/iam.serviceAccountUser"
  #   gcloud iam service-accounts keys create key.json \
  #     --iam-account=github-deployer@finalwishes-prod.iam.gserviceaccount.com
  #   # Then add the contents of key.json as the GitHub Secret GCP_SA_KEY_FINALWISHES_PROD
  #   rm key.json
  deploy-api:
    name: Deploy - API to Cloud Run
    runs-on: ubuntu-latest
    needs: [api-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY_FINALWISHES_PROD }}'

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy finalwishes-api \
            --source ./api \
            --region us-central1 \
            --project finalwishes-prod \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 300s \
            --concurrency 80 \
            --port 8080 \
            --update-env-vars GOOGLE_CLOUD_PROJECT=finalwishes-prod \
            --quiet
          # GOOGLE_CLOUD_PROJECT is REQUIRED: main.go only initializes the
          # Firestore + Cloud Storage clients when it is set. Without it the API
          # silently runs in local-dev mode (nil clients) and every upload fails
          # with "storage client not initialized". Cloud Run does NOT set this
          # automatically. The runtime compute SA also needs
          # roles/iam.serviceAccountTokenCreator on itself to sign V4 upload URLs.

  # ===========================================
  # Deploy: Firebase Functions
  # ===========================================
  deploy-functions:
    name: Deploy - Firebase Functions
    runs-on: ubuntu-latest
    needs: [web-build, api-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FINALWISHES_PROD }}'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install functions dependencies
        working-directory: ./functions
        run: npm ci

      - name: Deploy Firebase Functions
        run: firebase deploy --only functions --project finalwishes-prod

  # ===========================================
  # Deploy: Firestore Rules & Storage Rules
  # ===========================================
  deploy-rules:
    name: Deploy - Firestore & Storage Rules
    runs-on: ubuntu-latest
    needs: [web-build, api-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FINALWISHES_PROD }}'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore Rules & Indexes
        # MUST include firestore:indexes — without it, firestore.indexes.json never
        # reaches production, so any query needing a composite index throws
        # FAILED_PRECONDITION ("The query requires an index") and the feature hangs.
        # This was the root cause of vault upload / notifications / life-chapters
        # silently failing in the live demo while working in the emulator (which
        # auto-builds indexes). Index builds are async on Firestore's side.
        run: firebase deploy --only firestore:rules,firestore:indexes --project finalwishes-prod

      # Storage rules are DEFENSE-IN-DEPTH only: all uploads use V4 signed URLs
      # from the Go API which bypass these rules entirely (see storage.rules
      # header), and the resize extension uses the Admin SDK. The deploy fails
      # because the project's DEFAULT Firebase Storage bucket has not been
      # provisioned — that is the one-time "Get Started" in the Firebase console,
      # which no API exposes once the GCP resource location is finalized.
      # Marked non-blocking so the job reflects the real enforced state
      # (Firestore rules deployed) instead of a perpetual red. Remove
      # continue-on-error after the console "Get Started" is completed.
      - name: Deploy Storage Rules
        continue-on-error: true
        run: firebase deploy --only storage --project finalwishes-prod
