# Cloud Build — FinalWishes API
# Builds the Go API container and deploys to Cloud Run with Cloud SQL sidecar.
#
# Trigger: push to main branch (api/** path filter)
# Refs: ARCHITECTURE_DESIGN.md, ADR-037 (Cloud SQL PII Vault)
#
# Required substitutions (set in Cloud Build trigger):
#   _REGION:              us-central1
#   _SERVICE_NAME:        finalwishes-api
#   _CLOUD_SQL_INSTANCE:  finalwishes-prod:us-central1:finalwishes-pii-vault

steps:
  # Step 1: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '.'
    dir: 'api'

  # Step 2: Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

  # Step 3: Deploy to Cloud Run with Cloud SQL sidecar
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=${_CLOUD_SQL_INSTANCE}'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,CLOUD_SQL_CONNECTION=${_CLOUD_SQL_INSTANCE}'
      - '--set-secrets=VAULT_DB_PASSWORD=vault-db-password:latest'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=60s'
      - '--concurrency=80'
      - '--port=8080'

substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'finalwishes-api'
  _CLOUD_SQL_INSTANCE: 'finalwishes-prod:us-central1:finalwishes-pii-vault'

options:
  logging: CLOUD_LOGGING_ONLY
