## Critical Design Decisions
# 1. Royal Neo-Deco design system — Royal Blue (#133378) + Gold (#C8A951)
# 2. Hybrid database: Cloud SQL for PII/vault + Firestore for real-time
# 3. Firebase Auth with MFA (TOTP required after grace period)
# 4. SOC 2 architecture (not yet certified)
# 5. AES-256-GCM envelope encryption via Cloud KMS
# 6. Gmail API replaces SendGrid (zero vendor cost, domain-wide delegation)
# 7. Signed URL uploads bypass storage rules (Go API generates V4 URLs)
# 8. Sonner toasts for action feedback across all pages
# 9. Email verification gate blocks estate access until verified
# 10. API client has retry interceptor (exponential backoff, 2 retries)

## Known Gaps (Session 9 Deep Audit — Apr 16-17)
# CRITICAL:
# - Document signing NOT wired to UI (OpenSign backend exists, zero frontend calls)
# - User guide falsely claims signing + 72hr unseal (neither exists)
# - Heir Welcome needs verification — may not show voice/video as ETHOS describes
# - No auto-save on directives (manual "Save Draft" only)
# HIGH:
# - No public shareable memorial links (account required to view anything)
# - No QR code generation for invitations or sharing
# - No SMS/iMessage/WhatsApp invitations (email only)
# - No broadcasting capability (funerals, services, repasts)
# - No per-document role assignment (all-or-nothing visibility)
# - Dashboard is checklist-first, not life-first (contradicts ETHOS)
# MEDIUM:
# - No document version history
# - No granular per-person content permissions
# - Shepherd is reactive only (no proactive suggestions)
# - No in-app messaging (FR-801 in spec)

