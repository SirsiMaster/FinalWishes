  # ──────────────────────────────────────────────
  # OpenSign (E-Signature)
  # ──────────────────────────────────────────────
  /api/v1/opensign/create-envelope:
    post:
      summary: Create signing envelope
      description: |
        Proxies to Sirsi Sign (sign.sirsi.ai / OpenSign) to create an e-signature
        envelope from a template. Returns the envelope ID and a signing URL.
      operationId: createEnvelope
      tags: [OpenSign]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnvelopeRequest"
      responses:
        "200":
          description: Envelope created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEnvelopeResponse"
        "400":
          description: Invalid request body
        "401":
          description: Not authenticated
        "500":
          description: Server configuration error (OpenSign URL not set)
        "502":
          description: OpenSign API error or unreachable

  /api/envelopes:
    post:
      summary: Create signing envelope (legacy path)
      description: |
        Legacy endpoint that mirrors /api/v1/opensign/create-envelope.
        Prefer the versioned path.
      operationId: createEnvelopeLegacy
      tags: [OpenSign]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnvelopeRequest"
      responses:
        "200":
          description: Envelope created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEnvelopeResponse"
        "400":
          description: Invalid request body
        "502":
          description: OpenSign API error

