# Deploy preview channels on PRs to finalwishes-prod
name: Deploy to Firebase Hosting on PR (FinalWishes)

'on': pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '22.x'
  GO_VERSION: '1.26'

jobs:
  # ===========================================
  # API: Build & Test
  # ===========================================
  api-check:
    name: API - Build & Test
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race ./...

      - name: Build API
        run: go build -v ./cmd/api

  # ===========================================
  # Web: Test (Vitest)
  # ===========================================
  web-test:
    name: Web - Test (Vitest)
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ===========================================
  # Web: Build & Deploy Preview
  # ===========================================
  build_and_preview:
    name: Web - Build & Preview
    needs: [api-check, web-test]
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: ./web
        run: npm ci

      - name: Build web app
        working-directory: ./web
        run: npm run build

      - name: Check Firebase preview credentials
        id: firebase-preview
        env:
          FIREBASE_SERVICE_ACCOUNT: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FINALWISHES_PROD }}'
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Firebase preview deploy because the service-account secret is unavailable for this PR context."
          fi

      - name: Deploy preview
        if: ${{ steps.firebase-preview.outputs.available == 'true' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FINALWISHES_PROD }}'
          projectId: finalwishes-prod
